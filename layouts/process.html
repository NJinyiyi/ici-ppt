<section class="slide light">
  <div class="lab-mark dark">ICI Lab</div>
  <div class="content-kicker">{{kicker}}</div>
  <h1 class="content-title">{{title}}</h1>
  <div class="rule"></div>
  <div style="position:absolute;left:120px;top:336px;width:1680px;display:grid;grid-template-columns:repeat({{step_count}},1fr);gap:22px;align-items:stretch;">
    {{steps}}
  </div>
  <div style="position:absolute;left:120px;bottom:168px;width:1180px;font-size:31px;line-height:1.38;color:var(--ici-secondary-text);">{{note}}</div>
  <div class="footer dark">{{footer}}</div>
  <div class="tri-squares"><span></span><span></span><span></span></div>
</section>
