<section class="slide gradient">
  <div class="lab-mark" data-ppt="text" data-ppt-role="lab-mark">ICI Lab · Intelligent Creativity and Interaction</div>
  <main style="position:absolute;left:120px;top:245px;width:1370px;">
    <h1 data-ppt="text" data-ppt-role="closing-title" style="font-size:82px;line-height:1.08;margin:0;font-weight:850;">{{title}}</h1>
    <p data-ppt="text" data-ppt-role="closing-message" style="font-size:36px;line-height:1.42;color:rgba(255,255,255,0.82);margin:42px 0 0;width:1180px;">{{message}}</p>
  </main>
  <div data-ppt="text" data-ppt-role="closing-contact" style="position:absolute;left:120px;bottom:150px;font-size:28px;line-height:1.48;color:rgba(255,255,255,0.78);">{{contact}}</div>
  <div class="tri-squares"><span data-ppt="rect" data-ppt-role="tri-square"></span><span data-ppt="rect" data-ppt-role="tri-square"></span><span data-ppt="rect" data-ppt-role="tri-square"></span></div>
</section>
