<section class="slide light">
  <div class="lab-mark dark">ICI Lab</div>
  <div class="content-kicker">{{kicker}}</div>
  <h1 class="content-title">{{title}}</h1>
  <div class="rule"></div>
  <div class="card" style="position:absolute;left:120px;top:282px;width:1100px;height:610px;background:linear-gradient(135deg,#EEF6FF,#FFFFFF);display:flex;align-items:center;justify-content:center;">
    <div style="text-align:center;color:#64748B;">
      <div style="font-size:42px;font-weight:800;color:var(--ici-deep-blue);">{{figure_title}}</div>
      <div style="font-size:28px;margin-top:22px;">{{figure_note}}</div>
    </div>
  </div>
  <div style="position:absolute;right:120px;top:318px;width:470px;">
    <ul class="bullets">{{bullets}}</ul>
  </div>
  <div class="footer dark">{{footer}}</div>
  <div class="tri-squares"><span></span><span></span><span></span></div>
</section>
