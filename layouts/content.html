<section class="slide light">
  <div class="lab-mark dark">ICI Lab</div>
  <div class="content-kicker">{{kicker}}</div>
  <h1 class="content-title">{{title}}</h1>
  <div class="rule"></div>
  <div style="position:absolute;left:120px;top:278px;width:1260px;">
    <ul class="bullets">{{bullets}}</ul>
  </div>
  <aside class="card" style="position:absolute;right:120px;top:278px;width:380px;min-height:420px;padding:34px;">
    <div style="font-size:22px;color:var(--ici-main-blue);font-weight:800;margin-bottom:18px;">Key Point</div>
    <div style="font-size:31px;line-height:1.28;font-weight:760;color:var(--ici-deep-blue);">{{highlight}}</div>
  </aside>
  <div class="footer dark">{{footer}}</div>
  <div class="tri-squares"><span></span><span></span><span></span></div>
</section>
