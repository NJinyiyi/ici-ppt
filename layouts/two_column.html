<section class="slide light">
  <div class="lab-mark dark" data-ppt="text" data-ppt-role="lab-mark">ICI Lab</div>
  <div class="content-kicker" data-ppt="text" data-ppt-role="kicker">{{kicker}}</div>
  <h1 class="content-title" data-ppt="text" data-ppt-role="content-title">{{title}}</h1>
  <div class="rule" data-ppt="rect" data-ppt-role="rule"></div>
  <div style="position:absolute;left:120px;top:290px;width:1680px;display:grid;grid-template-columns:1fr 1fr;gap:42px;">
    <div class="card" data-ppt="card" data-ppt-role="left-card" style="height:560px;padding:44px;">
      <h2 data-ppt="text" data-ppt-role="column-title" style="font-size:42px;margin:0 0 28px;color:var(--ici-deep-blue);">{{left_title}}</h2>
      <ul class="bullets">{{left_items}}</ul>
    </div>
    <div class="card" data-ppt="card" data-ppt-role="right-card" style="height:560px;padding:44px;border-top:8px solid var(--ici-cyan-green);">
      <h2 data-ppt="text" data-ppt-role="column-title" style="font-size:42px;margin:0 0 28px;color:var(--ici-deep-blue);">{{right_title}}</h2>
      <ul class="bullets">{{right_items}}</ul>
    </div>
  </div>
  <div class="footer dark" data-ppt="text" data-ppt-role="footer">{{footer}}</div>
  <div class="tri-squares"><span data-ppt="rect" data-ppt-role="tri-square"></span><span data-ppt="rect" data-ppt-role="tri-square"></span><span data-ppt="rect" data-ppt-role="tri-square"></span></div>
</section>
