<section class="slide light">
  <div class="lab-mark dark">ICI Lab</div>
  <div class="content-kicker">{{kicker}}</div>
  <h1 class="content-title">{{title}}</h1>
  <div class="rule"></div>
  <div style="position:absolute;left:120px;top:290px;width:1680px;display:grid;grid-template-columns:1fr 1fr;gap:42px;">
    <div class="card" style="height:560px;padding:44px;">
      <h2 style="font-size:42px;margin:0 0 28px;color:var(--ici-deep-blue);">{{left_title}}</h2>
      <ul class="bullets">{{left_items}}</ul>
    </div>
    <div class="card" style="height:560px;padding:44px;border-top:8px solid var(--ici-cyan-green);">
      <h2 style="font-size:42px;margin:0 0 28px;color:var(--ici-deep-blue);">{{right_title}}</h2>
      <ul class="bullets">{{right_items}}</ul>
    </div>
  </div>
  <div class="footer dark">{{footer}}</div>
  <div class="tri-squares"><span></span><span></span><span></span></div>
</section>
