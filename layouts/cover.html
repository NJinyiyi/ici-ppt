<section class="slide gradient">
  <div class="lab-mark" data-ppt="text" data-ppt-role="lab-mark">ICI Lab · Zhejiang University</div>
  <main style="position:absolute;left:120px;top:292px;width:1280px;">
    <h1 class="title-large" data-ppt="text" data-ppt-role="cover-title">{{title}}</h1>
    <p class="subtitle" data-ppt="text" data-ppt-role="cover-subtitle">{{subtitle}}</p>
  </main>
  <div data-ppt="text" data-ppt-role="cover-meta" style="position:absolute;left:120px;bottom:142px;font-size:26px;color:rgba(255,255,255,0.76);line-height:1.5;">
    {{meta}}
  </div>
  <div class="tri-squares"><span data-ppt="rect" data-ppt-role="tri-square"></span><span data-ppt="rect" data-ppt-role="tri-square"></span><span data-ppt="rect" data-ppt-role="tri-square"></span></div>
</section>
