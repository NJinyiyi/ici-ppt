<section class="slide gradient">
  <div class="lab-mark" data-ppt="text" data-ppt-role="lab-mark">ICI Lab · Section</div>
  <div style="position:absolute;left:120px;top:258px;">
    <div class="big-number" data-ppt="text" data-ppt-role="section-number">{{section_no}}</div>
    <h1 data-ppt="text" data-ppt-role="section-title" style="font-size:76px;line-height:1.12;margin:34px 0 0;font-weight:850;width:1220px;">{{title}}</h1>
    <p data-ppt="text" data-ppt-role="section-subtitle" style="font-size:30px;line-height:1.45;color:rgba(255,255,255,0.78);width:1120px;margin:28px 0 0;">{{subtitle}}</p>
  </div>
  <div class="tri-squares"><span data-ppt="rect" data-ppt-role="tri-square"></span><span data-ppt="rect" data-ppt-role="tri-square"></span><span data-ppt="rect" data-ppt-role="tri-square"></span></div>
</section>
